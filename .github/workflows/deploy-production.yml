name: Deploy to Production

on:
  release:
    types: [published, created]
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version'
        required: true

jobs:
  deploy-production:
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://app.catvrf.com
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PRODUCTION_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.PRODUCTION_HOST }} >> ~/.ssh/known_hosts

      - name: Create backup
        run: |
          ssh -i ~/.ssh/id_rsa ${{ secrets.PRODUCTION_USER }}@${{ secrets.PRODUCTION_HOST }} << 'EOF'
            cd /var/www/catvrf
            
            # Create backup
            BACKUP_DIR="/backups/catvrf/$(date +%Y%m%d_%H%M%S)"
            mkdir -p "$BACKUP_DIR"
            
            # Backup database
            pg_dump $DATABASE_URL > "$BACKUP_DIR/database.sql"
            
            # Backup current application
            cp -r /var/www/catvrf "$BACKUP_DIR/app"
            
            echo "✅ Backup created at $BACKUP_DIR"
          EOF
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Deploy to production
        run: |
          ssh -i ~/.ssh/id_rsa ${{ secrets.PRODUCTION_USER }}@${{ secrets.PRODUCTION_HOST }} << 'EOF'
            cd /var/www/catvrf
            
            # Pull latest code
            git fetch origin main
            git checkout main
            git reset --hard origin/main
            
            # Install dependencies
            composer install --no-dev --optimize-autoloader
            npm ci
            npm run build
            
            # Database migrations
            php artisan migrate --force
            
            # Cache optimization
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            
            # Permissions
            chmod -R 775 storage bootstrap/cache
            chown -R www-data:www-data storage bootstrap/cache
            
            # Clear CDN cache
            php artisan cache:clear
            
            # Restart services
            sudo systemctl restart php8.3-fpm
            sudo systemctl restart nginx
            
            # Health check
            sleep 5
            curl -f https://app.catvrf.com/health || exit 1
            
            echo "✅ Production deployment completed successfully"
          EOF

      - name: Run production smoke tests
        run: |
          # Health check
          curl -f https://app.catvrf.com/health || exit 1
          
          # API check
          curl -f https://app.catvrf.com/api/health || exit 1
          
          # Admin check
          curl -f https://app.catvrf.com/admin || exit 1

      - name: Create GitHub release notes
        if: github.event_name == 'workflow_dispatch'
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ github.event.inputs.version }}
          release_name: Release ${{ github.event.inputs.version }}
          draft: false
          prerelease: false

      - name: Notify Slack
        if: always()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "Production Deployment Status: ${{ job.status }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Production Deployment*\nStatus: `${{ job.status }}`\nVersion: `${{ github.event.inputs.version || github.ref }}`\nCommit: `${{ github.sha }}`"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}

      - name: Rollback on failure
        if: failure()
        run: |
          ssh -i ~/.ssh/id_rsa ${{ secrets.PRODUCTION_USER }}@${{ secrets.PRODUCTION_HOST }} << 'EOF'
            cd /var/www/catvrf
            
            # Rollback to previous backup
            LATEST_BACKUP=$(ls -dt /backups/catvrf/*/ | head -1)
            
            if [ ! -z "$LATEST_BACKUP" ]; then
              cp -r "$LATEST_BACKUP/app" /var/www/catvrf.backup
              rm -rf /var/www/catvrf
              mv /var/www/catvrf.backup /var/www/catvrf
              
              # Restore database
              psql $DATABASE_URL < "$LATEST_BACKUP/database.sql"
              
              # Restart services
              sudo systemctl restart php8.3-fpm
              sudo systemctl restart nginx
              
              echo "⚠️ Rollback completed"
            fi
          EOF
