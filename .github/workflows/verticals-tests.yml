name: Verticals Tests - All 64 Business Verticals

on:
  push:
    branches: [main, develop]
    paths:
      - 'app/Domains/**'
      - 'tests/Feature/Domains/**'
      - 'tests/Unit/Domains/**'
      - '.github/workflows/verticals-tests.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'app/Domains/**'
      - 'tests/Feature/Domains/**'
      - 'tests/Unit/Domains/**'
      - '.github/workflows/verticals-tests.yml'
  workflow_dispatch:
    inputs:
      vertical:
        description: 'Run tests for specific vertical (leave empty for all)'
        required: false
        default: ''
        type: string

env:
  PHP_VERSION: '8.3'

jobs:
  verticals-tests:
    name: Verticals Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: catvrf_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: pdo_pgsql, redis, pcntl, posix, gd, curl, bcmath
          tools: composer

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-php-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-php-

      - name: Install dependencies
        run: composer install --no-ansi --no-interaction --no-scripts --prefer-dist --ignore-platform-reqs

      - name: Copy .env.testing
        run: cp .env.example .env.testing

      - name: Generate app key
        run: php artisan key:generate --env=testing

      - name: Configure environment for testing
        run: |
          echo "APP_ENV=testing" >> .env.testing
          echo "CACHE_DRIVER=redis" >> .env.testing
          echo "QUEUE_CONNECTION=redis" >> .env.testing
          echo "SESSION_DRIVER=redis" >> .env.testing
          echo "DB_CONNECTION=pgsql" >> .env.testing
          echo "DB_HOST=localhost" >> .env.testing
          echo "DB_DATABASE=catvrf_test" >> .env.testing
          echo "DB_USERNAME=postgres" >> .env.testing
          echo "DB_PASSWORD=postgres" >> .env.testing
          echo "DB_PORT=5432" >> .env.testing
          echo "REDIS_HOST=localhost" >> .env.testing
          echo "REDIS_PORT=6379" >> .env.testing

      - name: Run migrations
        run: php artisan migrate --env=testing --database=pgsql --seed --force
        env:
          DB_CONNECTION: pgsql
          DB_HOST: localhost
          DB_DATABASE: catvrf_test
          DB_USERNAME: postgres
          DB_PASSWORD: postgres
          DB_PORT: 5432

      - name: Run all verticals feature tests
        if: github.event.inputs.vertical == ''
        run: php artisan test --filter "*VerticalFeatureTest" --env=testing --parallel
        env:
          DB_CONNECTION: pgsql
          DB_HOST: localhost
          DB_DATABASE: catvrf_test
          DB_USERNAME: postgres
          DB_PASSWORD: postgres
          DB_PORT: 5432
          REDIS_HOST: localhost
          REDIS_PORT: 6379

      - name: Run specific vertical tests
        if: github.event.inputs.vertical != ''
        run: php artisan test --filter "*${{ github.event.inputs.vertical }}*VerticalFeatureTest" --env=testing
        env:
          DB_CONNECTION: pgsql
          DB_HOST: localhost
          DB_DATABASE: catvrf_test
          DB_USERNAME: postgres
          DB_PASSWORD: postgres
          DB_PORT: 5432
          REDIS_HOST: localhost
          REDIS_PORT: 6379

      - name: Run all verticals unit tests
        if: github.event.inputs.vertical == ''
        run: php artisan test --filter "*VerticalTest" --env=testing --parallel
        env:
          DB_CONNECTION: pgsql
          DB_HOST: localhost
          DB_DATABASE: catvrf_test
          DB_USERNAME: postgres
          DB_PASSWORD: postgres
          DB_PORT: 5432
          REDIS_HOST: localhost
          REDIS_PORT: 6379

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: verticals-test-results
          path: |
            storage/logs/
            coverage/
