# Prometheus Scrape Configuration for CatVRF
# 
# This configuration defines how Prometheus scrapes metrics from CatVRF application.
# 
# Usage:
# - Add to prometheus.yml under scrape_configs
# - Or use as separate file with file_sd_configs
#
# @author CatVRF Team
# @version 2026.04.17

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'catvrf-production'
    environment: 'production'

scrape_configs:
  # CatVRF Application Metrics
  - job_name: 'catvrf-app'
    scrape_interval: 30s
    scrape_timeout: 10s
    metrics_path: '/metrics'
    scheme: https
    static_configs:
      - targets:
          # Add your CatVRF application instances here
          - 'catvrf-app-1.catvrf.internal:443'
          - 'catvrf-app-2.catvrf.internal:443'
          - 'catvrf-app-3.catvrf.internal:443'
        labels:
          service: 'catvrf-app'
          environment: 'production'
    # Authentication for /metrics endpoint (protected by auth:landlord middleware)
    basic_auth:
      username: 'prometheus'
      password: '${PROMETHEUS_SCRAPING_PASSWORD}'
    # TLS configuration
    tls_config:
      insecure_skip_verify: false
      ca_file: '/etc/prometheus/certs/ca.crt'
      cert_file: '/etc/prometheus/certs/client.crt'
      key_file: '/etc/prometheus/certs/client.key'

  # Laravel Horizon Metrics (if using horizon exporter)
  - job_name: 'catvrf-horizon'
    scrape_interval: 30s
    scrape_timeout: 10s
    metrics_path: '/metrics'
    scheme: https
    static_configs:
      - targets:
          - 'catvrf-horizon-1.catvrf.internal:443'
        labels:
          service: 'catvrf-horizon'
          environment: 'production'
    basic_auth:
      username: 'prometheus'
      password: '${PROMETHEUS_SCRAPING_PASSWORD}'

  # Redis Exporter (for Redis metrics)
  - job_name: 'redis-exporter'
    scrape_interval: 30s
    static_configs:
      - targets:
          - 'redis-exporter.catvrf.internal:9121'
        labels:
          service: 'redis'
          environment: 'production'

  # ClickHouse Exporter (for ClickHouse metrics)
  - job_name: 'clickhouse-exporter'
    scrape_interval: 30s
    static_configs:
      - targets:
          - 'clickhouse-exporter.catvrf.internal:9363'
        labels:
          service: 'clickhouse'
          environment: 'production'

  # Node Exporter (for server metrics)
  - job_name: 'node-exporter'
    scrape_interval: 30s
    static_configs:
      - targets:
          - 'node-1.catvrf.internal:9100'
          - 'node-2.catvrf.internal:9100'
          - 'node-3.catvrf.internal:9100'
        labels:
          service: 'node'
          environment: 'production'

  # Nginx Exporter (for web server metrics)
  - job_name: 'nginx-exporter'
    scrape_interval: 30s
    static_configs:
      - targets:
          - 'nginx-exporter.catvrf.internal:9113'
        labels:
          service: 'nginx'
          environment: 'production'

  # PHP-FPM Exporter (for PHP metrics)
  - job_name: 'php-fpm-exporter'
    scrape_interval: 30s
    static_configs:
      - targets:
          - 'php-fpm-exporter.catvrf.internal:9253'
        labels:
          service: 'php-fpm'
          environment: 'production'

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - 'alertmanager.catvrf.internal:9093'
      timeout: 10s

# Load alert rules
rule_files:
  - '/etc/prometheus/rules/*.yml'

# Storage configuration
storage:
  tsdb:
    path: '/prometheus'
    retention.time: 15d
    retention.size: 10GB

